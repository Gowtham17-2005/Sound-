<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Only - Spy Mic</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #000; color: #00ff00; padding: 20px; }
        .box { border: 1px solid #00ff00; padding: 20px; border-radius: 10px; background: #0a0a0a; }
        button { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; border: 1px solid #00ff00; background: transparent; color: #00ff00; text-transform: uppercase; }
        button:active { background: #00ff00; color: #000; }
        .slider-box { margin: 25px 0; border-top: 1px solid #333; padding-top: 15px; }
        input[type=range] { width: 90%; accent-color: #00ff00; }
        label { display: block; margin-bottom: 5px; font-size: 14px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>VOICE ISOLATION MODE</h3>
        <p style="color: #ff0000; font-size: 12px;">WIRED EARPHONES RECOMMENDED</p>
        
        <button id="start">Activate Mic</button>
        <button id="stop" style="color: #ff4444; border-color: #ff4444;">Stop</button>

        <div class="slider-box">
            <label>VOICE VOLUME: <span id="v1">10</span>x</label>
            <input type="range" id="gain" min="1" max="50" value="10">
        </div>

        <div class="slider-box">
            <label>AIR/NOISE CUT (Low Cut): <span id="v2">500</span>Hz</label>
            <input type="range" id="highpass" min="100" max="1000" value="500">
            <small>Kaathu satham adhigama irundha idha yethunga</small>
        </div>

        <div class="slider-box">
            <label>CLARITY (High Cut): <span id="v3">3500</span>Hz</label>
            <input type="range" id="lowpass" min="2000" max="6000" value="3500">
            <small>Irayura satham adhigama irundha idha korainga</small>
        </div>
    </div>

    <script>
        let ctx, source, hpFilter, lpFilter, voiceBoost, amp, stream;

        document.getElementById('start').onclick = async () => {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: true, 
                    noiseSuppression: true,
                    autoGainControl: true 
                } 
            });
            source = ctx.createMediaStreamSource(stream);

            // 1. High-Pass Filter: Kaathu satham (wind) and bass noise cut panna
            hpFilter = ctx.createBiquadFilter();
            hpFilter.type = "highpass";
            hpFilter.frequency.value = 500; 

            // 2. Low-Pass Filter: High pitch "hiss" and irachal cut panna
            lpFilter = ctx.createBiquadFilter();
            lpFilter.type = "lowpass";
            lpFilter.frequency.value = 3500;

            // 3. Peaking Filter: Human voice range (1kHz - 3kHz) boost panna
            voiceBoost = ctx.createBiquadFilter();
            voiceBoost.type = "peaking";
            voiceBoost.frequency.value = 2000;
            voiceBoost.gain.value = 15;

            // 4. Final Amp
            amp = ctx.createGain();
            amp.gain.value = 10;

            // Connection Chain
            source.connect(hpFilter);
            hpFilter.connect(lpFilter);
            lpFilter.connect(voiceBoost);
            voiceBoost.connect(amp);
            amp.connect(ctx.destination);
            
            alert("Voice Only Mode Active!");
        };

        document.getElementById('stop').onclick = () => { 
            if(stream) stream.getTracks().forEach(t => t.stop()); 
            if(ctx) ctx.close(); 
        };
        
        // Control listeners
        document.getElementById('gain').oninput = (e) => { 
            if(amp) amp.gain.value = e.target.value; 
            document.getElementById('v1').innerText = e.target.value;
        };
        document.getElementById('highpass').oninput = (e) => { 
            if(hpFilter) hpFilter.frequency.value = e.target.value; 
            document.getElementById('v2').innerText = e.target.value;
        };
        document.getElementById('lowpass').oninput = (e) => { 
            if(lpFilter) lpFilter.frequency.value = e.target.value; 
            document.getElementById('v3').innerText = e.target.value;
        };
    </script>
</body>
</html>
